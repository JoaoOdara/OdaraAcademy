<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Odara Academy — Gestão</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--y:#FFB81D;--yd:#E5A200;--r:#EE2737;--g:#1D9E75;--b:#378ADD;--p:#534AB7;--dk:#0C0C0C;--bg:#FAF8F4;--card:#FFF;--bdr:#E8E5DD;--tx:#1A1A1A;--txs:#777;--rd:12px;--sh:0 2px 8px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Roboto,-apple-system,sans-serif;background:var(--bg);color:var(--tx)}

.topbar{background:var(--dk);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;position:sticky;top:0;z-index:50}
.topbar .logo{font-size:18px;font-weight:800;color:var(--y)}
.topbar .logo span{font-weight:400;font-size:12px;color:#666;margin-left:6px}
.tright{display:flex;align-items:center;gap:10px}
.tright .uname{color:#bbb;font-size:13px}
.tright .ubtn{background:none;border:1px solid #555;color:#aaa;font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer}
.tright .ubtn:hover{border-color:var(--y);color:var(--y)}

.layout{display:flex;min-height:calc(100vh - 56px)}
.side{width:230px;background:var(--card);border-right:1px solid var(--bdr);padding:12px 0;flex-shrink:0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.side .ss{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txs);padding:16px 20px 6px}
.side .si{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:var(--txs);cursor:pointer;border-left:3px solid transparent;transition:all .12s}
.side .si:hover{background:var(--bg);color:var(--tx)}
.side .si.on{background:#FFF8EA;color:var(--dk);font-weight:600;border-left-color:var(--y)}
.side .si .icon{font-size:16px;width:20px;text-align:center}

.main{flex:1;padding:28px 32px;max-width:1100px;overflow-x:auto}
.pane{display:none}.pane.on{display:block}

/* COMPONENTS */
.sec{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txs);margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--bdr)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--card);border-radius:var(--rd);padding:20px;text-align:center;box-shadow:var(--sh);border:1px solid var(--bdr)}
.kpi .kv{font-size:26px;font-weight:700}
.kpi .kl{font-size:10px;color:var(--txs);margin-top:4px;text-transform:uppercase;letter-spacing:.4px}

.btn{border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}
.btn:active{transform:scale(.97)}
.by{background:var(--y);color:var(--dk)}.by:hover{background:var(--yd)}
.br{background:var(--r);color:#fff}
.bo{background:none;border:1px solid var(--bdr);color:var(--tx)}.bo:hover{background:var(--bg)}
.bg{background:var(--g);color:#fff}
.bsm{padding:5px 10px;font-size:11px}
.bbl{width:100%}

.li{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f0ede5;cursor:pointer;transition:background .1s;border-radius:8px;margin-bottom:2px}
.li:hover{background:var(--bg)}
.li .av{width:36px;height:36px;border-radius:50%;background:var(--y);color:var(--dk);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.li .av.sq{border-radius:10px}
.li .inf{flex:1;min-width:0}
.li .inf .n{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li .inf .s{font-size:10px;color:var(--txs);margin-top:1px}
.li .act{font-size:11px;color:var(--b);font-weight:500}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.mbg.on{display:flex}
.mdl{background:var(--card);border-radius:16px;padding:28px;width:92%;max-width:600px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mdl h3{font-size:16px;font-weight:700;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.mdl .x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--txs);padding:0 4px}
.mdl .x:hover{color:var(--tx)}
.fg{margin-bottom:14px}
.fg label{font-size:11px;font-weight:600;color:var(--txs);display:block;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:13px;background:var(--bg);color:var(--tx);font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--y)}
.fg textarea{resize:vertical;min-height:70px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* TRAIL EDITOR */
.te-mod{background:var(--bg);border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid var(--bdr)}
.te-mod .te-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.te-mod .te-h .te-t{font-size:14px;font-weight:600}
.te-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;margin-bottom:4px;font-size:12px;background:var(--card);border:1px solid #eee}
.te-item:hover{border-color:var(--bdr)}
.te-item .te-ico{font-size:14px;flex-shrink:0}
.te-item .te-info{flex:1;min-width:0}
.te-item .te-name{font-weight:500}
.te-item .te-meta{font-size:10px;color:var(--txs);margin-top:1px}
.te-item .te-xp{font-size:10px;color:var(--txs);background:#f0ede5;padding:2px 6px;border-radius:6px}
.te-item .te-del{color:var(--r);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px}
.te-item .te-del:hover{background:#FCEBEB}
.te-item .te-edit{color:var(--b);cursor:pointer;font-size:10px;padding:2px 6px;border-radius:4px}
.te-item .te-edit:hover{background:#E6F1FB}

/* ASSIGN */
.a-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rd);padding:16px;margin-bottom:12px}
.a-card h4{font-size:14px;font-weight:600;margin-bottom:10px}
.a-chips{display:flex;flex-wrap:wrap;gap:6px}
.a-chip{font-size:11px;padding:5px 12px;border-radius:16px;border:1px solid var(--bdr);cursor:pointer;transition:all .15s;user-select:none}
.a-chip:hover{border-color:var(--y)}
.a-chip.on{background:var(--y);color:var(--dk);border-color:var(--y);font-weight:600}

/* HEATMAP */
.hm-wrap{overflow-x:auto;margin-bottom:24px}
.hm{border-collapse:separate;border-spacing:3px;font-size:11px}
.hm th{padding:6px 4px;font-weight:600;color:var(--txs);font-size:9px;text-transform:uppercase;letter-spacing:.3px}
.hm th.rot{writing-mode:vertical-lr;transform:rotate(180deg);text-align:left;height:120px;max-width:28px;white-space:nowrap;padding:4px 2px}
.hm td{padding:0;text-align:center}
.hm .name-cell{text-align:left;padding:4px 8px;font-weight:500;font-size:12px;white-space:nowrap;background:var(--card);border-radius:6px;border:1px solid #eee}
.hm .name-cell .role{font-size:9px;font-weight:400;color:var(--txs);display:block}
.hm-cell{width:36px;height:36px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:default;position:relative}
.hm-cell .hm-tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--dk);color:#fff;padding:6px 10px;border-radius:6px;font-size:10px;font-weight:400;white-space:nowrap;z-index:10;pointer-events:none}
.hm-cell:hover .hm-tip{display:block}
.hm-gap{background:var(--card);border:1px solid #eee;border-radius:6px;padding:2px 4px;font-size:9px;font-weight:600;color:var(--txs)}

.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--txs);padding:14px;background:var(--card);border-radius:8px;border:1px solid var(--bdr);margin-bottom:20px}
.legend .swatch{width:18px;height:18px;border-radius:4px;display:inline-block;vertical-align:middle;margin-right:4px}

@media(max-width:768px){.side{display:none}.main{padding:12px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--dk)">
<div style="background:var(--card);border-radius:16px;padding:48px 40px;width:400px;text-align:center">
  <div style="font-size:32px;font-weight:800;color:var(--y)">ODARA</div>
  <div style="font-size:12px;color:var(--txs);margin-bottom:32px;letter-spacing:2px">GESTÃO ACADEMY</div>
  <div class="fg"><input type="email" id="login-email" placeholder="Seu email"></div>
  <div class="fg"><input type="password" id="login-pass" placeholder="Sua senha"></div>
  <button class="btn by bbl" onclick="doLogin()" id="login-btn" style="padding:13px;font-size:15px">Entrar</button>
  <div id="login-msg" style="font-size:12px;margin-top:12px;min-height:18px"></div>
  <a href="index.html" style="font-size:11px;color:var(--b);margin-top:16px;display:inline-block;text-decoration:underline">← Visão do colaborador</a>
</div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">
<div class="topbar">
  <div class="logo">ODARA <span>GESTÃO ACADEMY</span></div>
  <div class="tright">
    <span class="uname" id="t-name"></span>
    <a href="index.html" class="ubtn">Visão colaborador</a>
    <button class="ubtn" onclick="doLogout()">Sair</button>
  </div>
</div>
<div class="layout">
<div class="side" id="sidebar">
  <div class="ss">Conteúdo</div>
  <div class="si on" onclick="go('trilhas',this)"><span class="icon">📚</span>Trilhas</div>
  <div class="si" onclick="go('atribuir',this)"><span class="icon">🎯</span>Atribuir trilhas</div>
  <div class="ss">Pessoas</div>
  <div class="si" onclick="go('pessoas',this)"><span class="icon">👥</span>Colaboradores</div>
  <div class="si" onclick="go('cargos',this)"><span class="icon">🏷️</span>Cargos e áreas</div>
  <div class="ss">Competências</div>
  <div class="si" onclick="go('matriz',this)"><span class="icon">📊</span>Matriz individual</div>
  <div class="si" onclick="go('geral',this)"><span class="icon">🗺️</span>Mapa de competências</div>
</div>
<div class="main">
  <div class="pane on" id="pn-trilhas"></div>
  <div class="pane" id="pn-atribuir"></div>
  <div class="pane" id="pn-pessoas"></div>
  <div class="pane" id="pn-cargos"></div>
  <div class="pane" id="pn-matriz"></div>
  <div class="pane" id="pn-geral"></div>
</div>
</div>
</div>

<div class="mbg" id="mbg" onclick="if(event.target===this)closeModal()"><div class="mdl" id="mdl"></div></div>

<script>
const SB_URL='https://khqbimmcibutfrfmkoxr.supabase.co'
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtocWJpbW1jaWJ1dGZyZm1rb3hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNTY1NjUsImV4cCI6MjA4OTkzMjU2NX0.w3vRAPhiU7Zavgkiv-ldjbHc_UJeGH9ck2tq_YN6MBo'
const sb=supabase.createClient(SB_URL,SB_KEY)
let ME=null

const TIPOS=[
  {v:'video',l:'Vídeo',i:'▶'},
  {v:'texto',l:'Leitura / Texto',i:'📄'},
  {v:'audio',l:'Áudio / Podcast',i:'🎧'},
  {v:'pdf',l:'PDF / Documento',i:'📕'},
  {v:'documento',l:'Word / Excel / Arquivo',i:'📎'},
  {v:'link',l:'Link externo',i:'🔗'},
  {v:'imagem',l:'Imagem / Infográfico',i:'🖼'},
  {v:'apresentacao',l:'Apresentação / Slides',i:'📊'}
]
const SUBTIPOS=[
  {v:'',l:'— Conteúdo padrão'},
  {v:'atividade_supervisionada',l:'Atividade supervisionada'},
  {v:'validacao_supervisor',l:'Validação do supervisor'},
  {v:'validacao_facilitador',l:'Validação do facilitador'},
  {v:'checklist',l:'Checklist prático'},
  {v:'simulado',l:'Simulado / Exercício'}
]
function tipoIco(t){return(TIPOS.find(x=>x.v===t)||{i:'📝'}).i}
function tipoLabel(t){return(TIPOS.find(x=>x.v===t)||{l:t}).l}

// ── AUTH ──
async function doLogin(){
  const e=document.getElementById('login-email').value.trim(),p=document.getElementById('login-pass').value
  const m=document.getElementById('login-msg')
  if(!e){m.textContent='Informe o email';m.style.color='var(--r)';return}
  document.getElementById('login-btn').textContent='Entrando...'
  const{error}=await sb.auth.signInWithPassword({email:e,password:p})
  if(error){m.textContent=error.message;m.style.color='var(--r)';document.getElementById('login-btn').textContent='Entrar';return}
  await initApp()
}
async function doLogout(){await sb.auth.signOut();location.reload()}
async function initApp(){
  const{data:{session}}=await sb.auth.getSession()
  if(!session){const h=window.location.hash;if(h&&h.includes('access_token')){const p=new URLSearchParams(h.substring(1));await sb.auth.setSession({access_token:p.get('access_token'),refresh_token:p.get('refresh_token')});window.location.hash=''}const{data:{session:s2}}=await sb.auth.getSession();if(!s2)return}
  const{data:{user}}=await sb.auth.getUser()
  const{data:p}=await sb.from('profiles').select('*').eq('id',user.id).single()
  if(!p){document.getElementById('login-msg').textContent='Perfil não encontrado';document.getElementById('login-msg').style.color='var(--r)';document.getElementById('login-btn').textContent='Entrar';return}
  ME=p;document.getElementById('login-page').style.display='none';document.getElementById('app').style.display='block'
  document.getElementById('t-name').textContent=ME.nome;loadTrilhas()
}

// ── NAV ──
function go(id,el){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));document.getElementById('pn-'+id).classList.add('on')
  document.querySelectorAll('.si').forEach(s=>s.classList.remove('on'));if(el)el.classList.add('on')
  if(id==='trilhas')loadTrilhas();if(id==='pessoas')loadPessoas();if(id==='atribuir')loadAtribuir();if(id==='matriz')loadMatriz();if(id==='geral')loadGeral();if(id==='cargos')loadCargos()
}
function showModal(h){document.getElementById('mdl').innerHTML=h;document.getElementById('mbg').classList.add('on')}
function closeModal(){document.getElementById('mbg').classList.remove('on')}

// ══════ TRILHAS ══════
async function loadTrilhas(){
  const el=document.getElementById('pn-trilhas')
  el.innerHTML='<div style="padding:40px;text-align:center;color:var(--txs)">Carregando...</div>'
  const{data}=await sb.from('trilhas').select('*').order('categoria,titulo')
  const trails=data||[]
  // count modules and contents per trail
  const tids=trails.map(t=>t.id)
  let modCounts={},contCounts={}
  if(tids.length){
    const{data:mods}=await sb.from('modulos').select('id,trilha_id').in('trilha_id',tids)
    ;(mods||[]).forEach(m=>{modCounts[m.trilha_id]=(modCounts[m.trilha_id]||0)+1})
    const modIds=(mods||[]).map(m=>m.id)
    if(modIds.length){
      const{data:conts}=await sb.from('conteudos').select('id,modulo_id').in('modulo_id',modIds)
      const modToTrail=Object.fromEntries((mods||[]).map(m=>[m.id,m.trilha_id]))
      ;(conts||[]).forEach(c=>{const tid=modToTrail[c.modulo_id];contCounts[tid]=(contCounts[tid]||0)+1})
    }
  }
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div><h2 style="font-size:20px;font-weight:700">Trilhas de desenvolvimento</h2><p style="font-size:12px;color:var(--txs);margin-top:4px">${trails.length} trilhas cadastradas</p></div>
    <button class="btn by" onclick="openTrailForm()">+ Nova trilha</button></div>`
  const cats=[...new Set(trails.map(t=>t.categoria))]
  cats.forEach(cat=>{
    h+=`<div class="sec">${cat}</div>`
    trails.filter(t=>t.categoria===cat).forEach(t=>{
      const mc=modCounts[t.id]||0,cc=contCounts[t.id]||0
      h+=`<div class="li" onclick="openTrailEditor('${t.id}')">
        <div class="av sq" style="font-size:11px">${t.titulo.substring(0,2).toUpperCase()}</div>
        <div class="inf"><div class="n">${t.titulo}</div><div class="s">${mc} módulos · ${cc} conteúdos · ${t.xp_conclusao||0} XP · ${t.prazo_dias||'—'} dias${t.obrigatoria?' · Obrigatória':''}</div></div>
        <div class="act">editar →</div></div>`
    })
  })
  el.innerHTML=h
}

function openTrailForm(t){
  t=t||{titulo:'',descricao:'',categoria:'Operacional',obrigatoria:true,prazo_dias:30,nota_minima:70,xp_conclusao:200}
  const isE=!!t.id
  let h=`<h3>${isE?'Editar':'Nova'} trilha<button class="x" onclick="closeModal()">×</button></h3>
    <div class="fg"><label>Título</label><input id="tf-t" value="${t.titulo}"></div>
    <div class="fg"><label>Descrição</label><textarea id="tf-d">${t.descricao||''}</textarea></div>
    <div class="r2">
      <div class="fg"><label>Categoria</label><select id="tf-c"><option ${t.categoria==='Operacional'?'selected':''}>Operacional</option><option ${t.categoria==='Qualidade'?'selected':''}>Qualidade</option><option ${t.categoria==='BPF'?'selected':''}>BPF</option><option ${t.categoria==='Segurança'?'selected':''}>Segurança</option><option ${t.categoria==='Onboarding'?'selected':''}>Onboarding</option></select></div>
      <div class="fg"><label>Prazo (dias)</label><input type="number" id="tf-p" value="${t.prazo_dias||30}"></div></div>
    <div class="r2">
      <div class="fg"><label>Nota mínima (%)</label><input type="number" id="tf-n" value="${t.nota_minima||70}"></div>
      <div class="fg"><label>XP conclusão</label><input type="number" id="tf-x" value="${t.xp_conclusao||200}"></div></div>
    <div class="fg"><label><input type="checkbox" id="tf-o" ${t.obrigatoria?'checked':''}> Obrigatória para todos os atribuídos</label></div>
    <div style="display:flex;gap:8px;margin-top:20px">
      <button class="btn by bbl" onclick="saveTrail('${t.id||''}')">${isE?'Salvar alterações':'Criar trilha'}</button>
      ${isE?`<button class="btn br bsm" onclick="deleteTrail('${t.id}')">Excluir</button>`:''}</div>`
  showModal(h)
}

async function saveTrail(id){
  const o={titulo:document.getElementById('tf-t').value,descricao:document.getElementById('tf-d').value,categoria:document.getElementById('tf-c').value,prazo_dias:+document.getElementById('tf-p').value||30,nota_minima:+document.getElementById('tf-n').value||70,xp_conclusao:+document.getElementById('tf-x').value||200,obrigatoria:document.getElementById('tf-o').checked,ativo:true}
  if(id){await sb.from('trilhas').update(o).eq('id',id)}else{await sb.from('trilhas').insert(o)}
  closeModal();loadTrilhas()
}
async function deleteTrail(id){if(!confirm('Excluir trilha e todos seus módulos/conteúdos?'))return;await sb.from('trilhas').delete().eq('id',id);closeModal();loadTrilhas()}

// ── TRAIL EDITOR (full) ──
async function openTrailEditor(id){
  const{data:t}=await sb.from('trilhas').select('*').eq('id',id).single()
  if(!t)return
  const{data:mods}=await sb.from('modulos').select('*').eq('trilha_id',id).order('ordem')
  const modIds=(mods||[]).map(m=>m.id)
  let conts=[],avals=[]
  if(modIds.length){
    const{data:c}=await sb.from('conteudos').select('*').in('modulo_id',modIds).order('ordem')
    conts=c||[]
    const{data:a}=await sb.from('avaliacoes').select('*').in('modulo_id',modIds).order('ordem')
    avals=a||[]
  }

  let h=`<h3 style="margin-bottom:4px">${t.titulo}<button class="x" onclick="closeModal()">×</button></h3>
    <p style="font-size:12px;color:var(--txs);margin-bottom:16px">${t.categoria} · ${t.xp_conclusao} XP · ${t.prazo_dias} dias${t.obrigatoria?' · Obrigatória':''}</p>
    <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
      <button class="btn bo bsm" onclick="closeModal();openTrailForm(${JSON.stringify(t).replace(/"/g,'&quot;')})">✏ Editar informações</button>
      <button class="btn by bsm" onclick="openModForm('${t.id}')">+ Novo módulo</button>
    </div>`

  ;(mods||[]).forEach((m,mi)=>{
    const mConts=conts.filter(c=>c.modulo_id===m.id)
    const mAvals=avals.filter(a=>a.modulo_id===m.id)
    h+=`<div class="te-mod"><div class="te-h">
        <span class="te-t">${mi+1}. ${m.titulo}</span>
        <div style="display:flex;gap:4px">

async function showMx(){

        <span style="font-size:12px;flex:1">${c.nome}</span>

          <div style="text-align:center"><div style="font-size:9px;color:var(--txs)">Atual</div><select style="width:55px;font-size:12px;padding:4px;border-radius:6px;border:1px solid var(--bdr)" onchange="updMx('${pid}','${c.id}','nivel_atual',this.value)">${[0,1,2,3,4].map(n=>`<option value="${n}" ${a===n?'selected':''}>${n}</option>`).join('')}</select></div>
          <span style="color:var(--txs);margin-top:10px">→</span>
          <div style="text-align:center"><div style="font-size:9px;color:var(--txs)">Desejado</div><select style="width:55px;font-size:12px;padding:4px;border-radius:6px;border:1px solid var(--bdr)" onchange="updMx('${pid}','${c.id}','nivel_desejado',this.value)">${[0,1,2,3,4].map(n=>`<option value="${n}" ${d===n?'selected':''}>${n}</option>`).join('')}</select></div>
          ${g>0?`<span style="background:#FCEBEB;color:#A32D2D;font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;margin-top:10px">gap ${g}</span>`:a>0&&g===0?'<span style="color:var(--g);margin-top:10px">✓</span>':''}

// ══════ VISÃO GERAL — HEATMAP ══════
async function loadGeral(){
  const el=document.getElementById('pn-geral')
  el.innerHTML='<div style="padding:40px;text-align:center;color:var(--txs)">Carregando mapa de competências...</div>'
  const{data:ppl}=await sb.from('profiles').select('id,nome').order('nome')
  const{data:comp}=await sb.from('competencias').select('*').order('categoria,nome')
  const{data:allMc}=await sb.from('matriz_competencias').select('*')
  const people=ppl||[],comps=comp||[],mc=allMc||[]
  const{data:cargos}=await sb.from('cargos').select('id,nome')
  const{data:areas}=await sb.from('areas').select('id,nome')
  const cm=Object.fromEntries((cargos||[]).map(c=>[c.id,c.nome]))

  // KPIs
  let tGaps=0,critPpl=0,profCount=0,totalCells=0
  people.forEach(p=>{let hasCrit=false;comps.forEach(c=>{const m=mc.find(x=>x.profile_id===p.id&&x.competencia_id===c.id);const a=m?.nivel_atual||0,d=m?.nivel_desejado||0,g=Math.max(0,d-a);tGaps+=g;totalCells++;if(g>=2)hasCrit=true;if(a>=d&&d>0)profCount++});if(hasCrit)critPpl++})

  let h=`<h2 style="font-size:20px;font-weight:700;margin-bottom:4px">Mapa de competências</h2>
    <p style="font-size:12px;color:var(--txs);margin-bottom:20px">Visão geral de todos os colaboradores. Quanto mais escura a célula, maior o gap. Cores verdes indicam proficiência.</p>
    <div class="kpis">
      <div class="kpi"><div class="kv">${people.length}</div><div class="kl">Colaboradores</div></div>
      <div class="kpi"><div class="kv">${comps.length}</div><div class="kl">Competências</div></div>
      <div class="kpi"><div class="kv">${tGaps}</div><div class="kl">Gaps totais</div></div>
      <div class="kpi"><div class="kv" style="color:var(--r)">${critPpl}</div><div class="kl">Com gap crítico</div></div>
      <div class="kpi"><div class="kv">${totalCells?Math.round(profCount/totalCells*100):0}%</div><div class="kl">Proficiência geral</div></div>
    </div>`

  // Legend
  h+=`<div class="legend">
    <span><span class="swatch" style="background:#C8E6C9"></span> Proficiente</span>
    <span><span class="swatch" style="background:#E8F5E9"></span> Gap 0</span>
    <span><span class="swatch" style="background:#FFF9C4"></span> Gap 1</span>
    <span><span class="swatch" style="background:#FFCC80"></span> Gap 2</span>
    <span><span class="swatch" style="background:#EF9A9A"></span> Gap 3</span>
    <span><span class="swatch" style="background:#E53935;color:#fff;padding:1px 4px;border-radius:3px"></span> Gap 4</span>
    <span style="margin-left:8px;color:var(--txs)">Número = nível atual (0-4)</span>
  </div>`

  // Heatmap by category
  const cats=[...new Set(comps.map(c=>c.categoria))]
  cats.forEach(cat=>{
    const catComps=comps.filter(c=>c.categoria===cat)
    h+=`<div class="sec">${cat}</div><div class="hm-wrap"><table class="hm"><thead><tr><th style="min-width:160px"></th>`
    catComps.forEach(c=>{
      const short=c.nome.length>20?c.nome.substring(0,18)+'…':c.nome
      h+=`<th class="rot" title="${c.nome}">${short}</th>`
    })
    h+=`<th class="rot">Total gaps</th></tr></thead><tbody>`
    people.forEach(p=>{
      let pGaps=0
      h+=`<tr><td class="name-cell">${p.nome}<span class="role">${cm[p.cargo_id]||''}</span></td>`
      catComps.forEach(c=>{
        const m=mc.find(x=>x.profile_id===p.id&&x.competencia_id===c.id)
        const a=m?.nivel_atual||0,d=m?.nivel_desejado||0,g=Math.max(0,d-a);pGaps+=g
        let bg,fg
        if(d===0&&a===0){bg='#F5F5F5';fg='#bbb'}
        else if(g===0){bg=a>=3?'#C8E6C9':'#E8F5E9';fg=a>=3?'#2E7D32':'#4CAF50'}
        else if(g===1){bg='#FFF9C4';fg='#F57F17'}
        else if(g===2){bg='#FFCC80';fg='#E65100'}
        else if(g===3){bg='#EF9A9A';fg='#C62828'}
        else{bg='#E53935';fg='#FFF'}
        h+=`<td><div class="hm-cell" style="background:${bg};color:${fg}">${a}<div class="hm-tip">${c.nome}: atual ${a} → desejado ${d}${g>0?' (gap '+g+')':' ✓'}</div></div></td>`
      })
      h+=`<td><div class="hm-gap" style="${pGaps>3?'background:#FCEBEB;color:#A32D2D':''}">${pGaps}</div></td></tr>`
    })
    h+='</tbody></table></div>'
  })

  // Summary: biggest gaps
  h+=`<div class="sec">Maiores gaps por competência</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px;margin-bottom:24px">`
  comps.forEach(c=>{
    let totalG=0,count=0
    people.forEach(p=>{const m=mc.find(x=>x.profile_id===p.id&&x.competencia_id===c.id);const g=Math.max(0,(m?.nivel_desejado||0)-(m?.nivel_atual||0));totalG+=g;if(g>0)count++})
    if(totalG===0)return
    const pct=people.length?Math.round(count/people.length*100):0
    const barColor=pct>60?'var(--r)':pct>30?'var(--y)':'var(--g)'
    h+=`<div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:12px">
      <div style="font-size:12px;font-weight:600;margin-bottom:4px">${c.nome}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="flex:1;height:8px;background:#eee;border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${barColor};border-radius:4px"></div></div>
        <span style="font-size:11px;font-weight:600;color:${barColor}">${pct}%</span>
      </div>
      <div style="font-size:10px;color:var(--txs);margin-top:4px">${count}/${people.length} pessoas com gap · Total: ${totalG}</div>
    </div>`
  })
  h+='</div>'

  el.innerHTML=h
}

// ══════ CARGOS E ÁREAS ══════
async function loadCargos(){
  const el=document.getElementById('pn-cargos')
  el.innerHTML='<div style="padding:40px;text-align:center;color:var(--txs)">Carregando...</div>'
  const{data:cargos}=await sb.from('cargos').select('*').order('nome')
  const{data:areas}=await sb.from('areas').select('*').order('nome')
  let h=`<h2 style="font-size:20px;font-weight:700;margin-bottom:20px">Cargos e áreas</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">`

  // Cargos
  h+=`<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h3 style="font-size:15px;font-weight:600">Cargos (${(cargos||[]).length})</h3>
    <button class="btn by bsm" onclick="addCargo()">+ Cargo</button></div>`
  ;(cargos||[]).forEach(c=>{
    h+=`<div class="li" style="padding:8px 12px"><div class="inf"><div class="n">${c.nome}</div></div>
      <span style="color:var(--r);cursor:pointer;font-size:12px" onclick="delCargo('${c.id}')">×</span></div>`
  })
  if(!(cargos||[]).length) h+='<div style="color:var(--txs);font-size:12px;padding:12px">Nenhum cargo</div>'
  h+='</div>'

  // Áreas
  h+=`<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h3 style="font-size:15px;font-weight:600">Áreas (${(areas||[]).length})</h3>
    <button class="btn by bsm" onclick="addArea()">+ Área</button></div>`
  ;(areas||[]).forEach(a=>{
    h+=`<div class="li" style="padding:8px 12px"><div class="inf"><div class="n">${a.nome}</div></div>
      <span style="color:var(--r);cursor:pointer;font-size:12px" onclick="delArea('${a.id}')">×</span></div>`
  })
  if(!(areas||[]).length) h+='<div style="color:var(--txs);font-size:12px;padding:12px">Nenhuma área</div>'
  h+='</div></div>'

  // Import section
  h+=`<div class="sec">Importar dados via CSV</div>
    <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rd);padding:20px;margin-bottom:16px">
      <h4 style="font-size:14px;font-weight:600;margin-bottom:8px">Importar colaboradores</h4>
      <p style="font-size:12px;color:var(--txs);margin-bottom:12px">Arquivo CSV com colunas: <code style="background:#eee;padding:2px 6px;border-radius:4px">nome,email,cargo,area,turno</code><br>Cargos e áreas serão criados automaticamente se não existirem.</p>
      <input type="file" id="csv-people" accept=".csv,.txt" style="font-size:12px;margin-bottom:8px">
      <button class="btn by bsm" onclick="importPeople()">Importar colaboradores</button>
      <div id="import-msg" style="font-size:11px;margin-top:8px;min-height:16px"></div>
    </div>
    <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rd);padding:20px">
      <h4 style="font-size:14px;font-weight:600;margin-bottom:8px">Importar cargos e áreas</h4>
      <p style="font-size:12px;color:var(--txs);margin-bottom:12px">Arquivo CSV com colunas: <code style="background:#eee;padding:2px 6px;border-radius:4px">tipo,nome</code> (tipo = "cargo" ou "area")</p>
      <input type="file" id="csv-cargos" accept=".csv,.txt" style="font-size:12px;margin-bottom:8px">
      <button class="btn by bsm" onclick="importCargos()">Importar cargos/áreas</button>
      <div id="import-msg2" style="font-size:11px;margin-top:8px;min-height:16px"></div>
    </div>`

  el.innerHTML=h
}

async function addCargo(){
  const nome=prompt('Nome do cargo:')
  if(!nome)return
  await sb.from('cargos').insert({nome})
  loadCargos()
}
async function delCargo(id){if(!confirm('Excluir cargo?'))return;await sb.from('cargos').delete().eq('id',id);loadCargos()}
async function addArea(){
  const nome=prompt('Nome da área:')
  if(!nome)return
  // busca unidade padrão
  const{data:un}=await sb.from('unidades').select('id').limit(1).single()
  await sb.from('areas').insert({nome,unidade_id:un?.id||null})
  loadCargos()
}
async function delArea(id){if(!confirm('Excluir área?'))return;await sb.from('areas').delete().eq('id',id);loadCargos()}

function parseCSV(text){
  const lines=text.trim().split('\n').map(l=>l.trim()).filter(l=>l)
  if(lines.length<2)return[]
  const headers=lines[0].split(/[,;\t]/).map(h=>h.trim().toLowerCase().replace(/"/g,''))
  return lines.slice(1).map(line=>{
    const vals=line.split(/[,;\t]/).map(v=>v.trim().replace(/"/g,''))
    const obj={}
    headers.forEach((h,i)=>obj[h]=vals[i]||'')
    return obj
  })
}

async function importPeople(){
  const file=document.getElementById('csv-people').files[0]
  const msg=document.getElementById('import-msg')
  if(!file){msg.textContent='Selecione um arquivo CSV';msg.style.color='var(--r)';return}
  msg.textContent='Processando...';msg.style.color='var(--txs)'
  const text=await file.text()
  const rows=parseCSV(text)
  if(!rows.length){msg.textContent='Arquivo vazio ou formato inválido';msg.style.color='var(--r)';return}

  // busca/cria cargos e áreas
  const{data:cargosExist}=await sb.from('cargos').select('id,nome')
  const{data:areasExist}=await sb.from('areas').select('id,nome')
  const{data:un}=await sb.from('unidades').select('id').limit(1).maybeSingle()
  const cargoMap=Object.fromEntries((cargosExist||[]).map(c=>[c.nome.toLowerCase(),c.id]))
  const areaMap=Object.fromEntries((areasExist||[]).map(a=>[a.nome.toLowerCase(),a.id]))

  let created=0,errors=0
  for(const row of rows){
    try{
      let cargoId=null,areaId=null
      if(row.cargo){
        cargoId=cargoMap[row.cargo.toLowerCase()]
        if(!cargoId){
          const{data:nc}=await sb.from('cargos').insert({nome:row.cargo}).select('id').single()
          if(nc){cargoId=nc.id;cargoMap[row.cargo.toLowerCase()]=nc.id}
        }
      }
      if(row.area){
        areaId=areaMap[row.area.toLowerCase()]
        if(!areaId){
          const{data:na}=await sb.from('areas').insert({nome:row.area,unidade_id:un?.id||null}).select('id').single()
          if(na){areaId=na.id;areaMap[row.area.toLowerCase()]=na.id}
        }
      }
      await sb.from('profiles').insert({
        nome:row.nome,
        matricula:row.matricula||null,
        role:'colaborador',
        turno:row.turno||'A',
        cargo_id:cargoId,
        area_id:areaId
      })
      created++
    }catch(e){errors++}
  }
  msg.textContent=`Importação concluída: ${created} criados, ${errors} erros`;msg.style.color='var(--g)'
}

async function importCargos(){
  const file=document.getElementById('csv-cargos').files[0]
  const msg=document.getElementById('import-msg2')
  if(!file){msg.textContent='Selecione um arquivo CSV';msg.style.color='var(--r)';return}
  const text=await file.text()
  const rows=parseCSV(text)
  let cc=0,ac=0
  const{data:un}=await sb.from('unidades').select('id').limit(1).maybeSingle()
  for(const row of rows){
    if(row.tipo==='cargo'&&row.nome){await sb.from('cargos').insert({nome:row.nome});cc++}
    if(row.tipo==='area'&&row.nome){await sb.from('areas').insert({nome:row.nome,unidade_id:un?.id||null});ac++}
  }
  msg.textContent=`Importados: ${cc} cargos, ${ac} áreas`;msg.style.color='var(--g)'
  loadCargos()
}

// ── INIT ──
initApp()
</script>
